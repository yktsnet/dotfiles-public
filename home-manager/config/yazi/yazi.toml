[mgr]
ratio = [1, 2, 4]
show_hidden = true
show_symlink = true
sort_by = "natural"
sort_sensitive = false
sort_reverse = false

[preview]
wrap = "yes"
max_width = 600
max_height = 900

[opener]
edit = [
  { run = 'nvim "$@"', block = true }
]

[open]
rules = [
  { mime = "text/*", use = "edit" },
  { mime = "application/json", use = "edit" },
  { mime = "inode/empty", use = "edit" },
  { mime = "inode/x-empty", use = "edit" },
]
